apiVersion: v1
kind: Namespace
metadata:
  name: llm-inference
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-cpu-demo
  namespace: llm-inference
  labels:
    app.kubernetes.io/name: vllm-cpu-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm-cpu-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm-cpu-demo
        kubefisher.io/platform: vllm
        kubefisher.io/model: facebook-opt-125m
        kubefisher.io/team: default
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - python3
            - -m
            - vllm.entrypoints.openai.api_server
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --model
            - facebook/opt-125m
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-cpu-demo
  namespace: llm-inference
  labels:
    app.kubernetes.io/name: vllm-cpu-demo
spec:
  selector:
    app.kubernetes.io/name: vllm-cpu-demo
  ports:
    - name: http
      port: 8000
      targetPort: http

