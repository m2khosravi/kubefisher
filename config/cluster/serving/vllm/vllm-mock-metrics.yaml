apiVersion: v1
kind: Namespace
metadata:
  name: llm-inference
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-mock-metrics
  namespace: llm-inference
  labels:
    app.kubernetes.io/name: vllm-mock
data:
  nginx.conf: |
    pid /tmp/nginx.pid;
    events {}
    http {
      server {
        listen 8000;
        server_name _;

        location = /metrics {
          default_type text/plain;
          alias /usr/share/nginx/html/metrics.prom;
        }

        location = /health {
          default_type text/plain;
          return 200 'ok';
        }

        location = / {
          return 404;
        }
      }
    }
  metrics.prom: |
    # HELP vllm:prompt_tokens_total Number of prefill tokens processed.
    # TYPE vllm:prompt_tokens_total counter
    vllm:prompt_tokens_total{model_name="mock-model"} 100

    # HELP vllm:generation_tokens_total Number of generation tokens processed.
    # TYPE vllm:generation_tokens_total counter
    vllm:generation_tokens_total{model_name="mock-model"} 25

    # HELP vllm:request_success_total Count of successfully processed requests.
    # TYPE vllm:request_success_total counter
    vllm:request_success_total{model_name="mock-model",finish_reason="stop"} 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-mock
  namespace: llm-inference
  labels:
    app.kubernetes.io/name: vllm-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm-mock
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm-mock
        kubefisher.io/platform: vllm
        kubefisher.io/model: mock-model
        kubefisher.io/team: default
    spec:
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: cfg
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: cfg
              mountPath: /usr/share/nginx/html/metrics.prom
              subPath: metrics.prom
              readOnly: true
      volumes:
        - name: cfg
          configMap:
            name: vllm-mock-metrics
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-mock
  namespace: llm-inference
  labels:
    app.kubernetes.io/name: vllm-mock
spec:
  selector:
    app.kubernetes.io/name: vllm-mock
  ports:
    - name: http
      port: 8000
      targetPort: http

