apiVersion: v1
kind: Namespace
metadata:
  name: llm-inference
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: llm-inference
  labels:
    app.kubernetes.io/name: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
        kubefisher.io/platform: vllm
        kubefisher.io/model: unsloth-Llama-3.2-1B-Instruct
        kubefisher.io/team: default
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - python3
            - -m
            - vllm.entrypoints.openai.api_server
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            # Choose a small model for demos; replace in GPU clusters as needed.
            - --model
            - unsloth/Llama-3.2-1B-Instruct
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: llm-inference
  labels:
    app.kubernetes.io/name: vllm
spec:
  selector:
    app.kubernetes.io/name: vllm
  ports:
    - name: http
      port: 8000
      targetPort: http

