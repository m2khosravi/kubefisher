apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: kubefisher-dev

# KServe “latest stable” expects modern Kubernetes; use a 1.32.x-based k3s.
image: rancher/k3s:v1.32.13-k3s1
servers: 1
agents: 2

ports:
  - port: 8080:80
    nodeFilters:
      - loadbalancer
  - port: 8443:443
    nodeFilters:
      - loadbalancer

options:
  k3d:
    wait: true
    timeout: "120s"
  k3s:
    extraArgs:
      - arg: "--disable=traefik"
        nodeFilters:
          - server:*
    nodeLabels:
      - label: accelerator=nvidia-a10g
        nodeFilters:
          - agent:0
          - agent:1
      - label: kubefisher.io/spot=true
        nodeFilters:
          - agent:1