---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: teaminferencequotas.quota.kubefisher.io
spec:
  group: quota.kubefisher.io
  names:
    kind: TeamInferenceQuota
    listKind: TeamInferenceQuotaList
    plural: teaminferencequotas
    shortNames:
    - tiq
    singular: teaminferencequota
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Budgeted namespace
      jsonPath: .metadata.namespace
      name: NAMESPACE
      type: string
    - description: Quota phase
      jsonPath: .status.phase
      name: PHASE
      type: string
    - description: Rolling 24h tokens used
      jsonPath: .status.tokensUsedToday
      name: TOKENS-USED
      type: integer
    - description: Daily token budget
      jsonPath: .spec.dailyTokenBudget
      name: BUDGET
      type: integer
    - description: Month-to-date cost (USD)
      jsonPath: .status.costUsedThisMonth
      name: COST-USED
      type: string
    - description: Monthly USD limit
      jsonPath: .spec.monthlyCostLimitUSD
      name: LIMIT
      type: string
    - description: Enforcement mode
      jsonPath: .spec.enforcementMode
      name: MODE
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: TeamInferenceQuota is the Schema for the teaminferencequotas
          API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TeamInferenceQuotaSpec defines token and cost budgets for
              the quota object's namespace.
            properties:
              alertThresholdPct:
                default: 80
                description: AlertThresholdPct is the utilization percentage at or
                  above which phase becomes Warning (until exceeded).
                format: int32
                maximum: 100
                minimum: 1
                type: integer
              dailyTokenBudget:
                description: DailyTokenBudget is the maximum number of generation
                  tokens (rolling 24h window from Prometheus) allowed per day.
                format: int64
                minimum: 0
                type: integer
              enforcementMode:
                default: Enforce
                description: EnforcementMode selects Enforce (deny new GPU pods at
                  admission when Exceeded) vs Audit (allow + events only).
                enum:
                - Enforce
                - Audit
                type: string
              monthlyCostLimitUSD:
                description: MonthlyCostLimitUSD is a decimal USD string (e.g. "500.00")
                  for the calendar month (UTC).
                pattern: ^([0-9]+(\.[0-9]+)?)$
                type: string
            required:
            - dailyTokenBudget
            - monthlyCostLimitUSD
            type: object
          status:
            description: TeamInferenceQuotaStatus defines observed spend and phase.
            properties:
              conditions:
                description: Conditions represent the state of the quota resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              costBudgetRemainingPct:
                description: CostBudgetRemainingPct is 100 minus consumed percent
                  of the monthly USD budget.
                format: int32
                maximum: 100
                minimum: 0
                type: integer
              costUsedThisMonth:
                description: CostUsedThisMonth is formatted USD spent this calendar
                  month (UTC), derived from cost_per_hour.
                type: string
              lastEvaluationTime:
                description: LastEvaluationTime is the last reconcile evaluation time
                  (including failed Prometheus queries).
                format: date-time
                type: string
              nextResetTime:
                description: NextResetTime is the start of the next calendar month
                  (UTC), used for cost budget messaging.
                format: date-time
                type: string
              phase:
                description: Phase is the high-level quota state.
                enum:
                - Active
                - Warning
                - Exceeded
                - Unknown
                type: string
              tokenBudgetRemainingPct:
                description: TokenBudgetRemainingPct is 100 minus consumed percent
                  of the daily token budget (0 if budget is 0).
                format: int32
                maximum: 100
                minimum: 0
                type: integer
              tokensUsedToday:
                description: |-
                  TokensUsedToday is the rolling 24h token total from Prometheus (not calendar midnight).
                  Always serialized (including zero) so UIs and kubectl print columns can show the value.
                format: int64
                type: integer
            required:
            - tokensUsedToday
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
