apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- name: vpod.kb.io
  namespaceSelector:
    matchExpressions:
      - key: kubefisher.io/quota-enforcement
        operator: In
        values:
          - enabled
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
          - kube-system
          - operator-system
          - kubefisher-system
