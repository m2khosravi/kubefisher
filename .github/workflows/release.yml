name: release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish GHCR images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component:
          - name: cost-patcher
            image: ghcr.io/m2khosravi/kubefisher/cost-patcher
            dockerfile: build/cost-patcher/Dockerfile
          - name: operator
            image: ghcr.io/m2khosravi/kubefisher/operator
            dockerfile: operator/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v5
        with:
          registry: ghcr.io
          username: github.actor
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "tags=edge" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
            semver_regex='^[0-9]+\.[0-9]+\.[0-9]+$'
            if [[ ! "$version" =~ $semver_regex ]]; then
              echo "Invalid tag format: $version" >&2
              exit 1
            fi
            major_minor="${version%.*}"
            echo "tags=${version},${major_minor},latest" >> $GITHUB_OUTPUT
          else
            echo "Unsupported ref: ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.component.dockerfile }}
          push: true
          tags: ${{ matrix.component.image }}:${{ steps.tags.outputs.tags }}
          platforms: linux/amd64
