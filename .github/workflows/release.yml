name: release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish Docker Hub images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        component:
          - name: cost-patcher
            image: mkhosravi73/kubefisher-cost-patcher
            dockerfile: build/cost-patcher/Dockerfile
          - name: operator
            image: mkhosravi73/kubefisher-operator
            dockerfile: operator/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.6.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "tags=edge" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
            semver_regex='^[0-9]+\.[0-9]+\.[0-9]+$'
            if [[ ! "$version" =~ $semver_regex ]]; then
              echo "Invalid tag format: $version" >&2
              exit 1
            fi
            major_minor="${version%.*}"
            echo "tags=${version},${major_minor},latest" >> $GITHUB_OUTPUT
          else
            echo "Unsupported ref: ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Construct image tags
        id: image_tags
        run: |
          image="${{ matrix.component.image }}"
          full_tags=""
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.tags.outputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            [ -n "$full_tags" ] && full_tags="${full_tags},"
            full_tags="${full_tags}${image}:${tag}"
          done
          echo "tags=${full_tags}" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.component.dockerfile }}
          push: true
          tags: ${{ steps.image_tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64
