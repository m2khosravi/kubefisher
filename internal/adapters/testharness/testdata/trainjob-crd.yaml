# Minimal TrainJob CRD stub for envtest (no Kubeflow Trainer dependency).
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: trainjobs.trainer.kubeflow.org
spec:
  group: trainer.kubeflow.org
  names:
    kind: TrainJob
    listKind: TrainJobList
    plural: trainjobs
    singular: trainjob
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            status:
              type: object
              properties:
                startTime:
                  type: string
                  format: date-time
                completionTime:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
          x-kubernetes-preserve-unknown-fields: true
